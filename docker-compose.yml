
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    ports:
      - "9092:9092"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - app-network

  api-gateway:
    build: ./api-gateway
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
      - order-service
      - ticket-service
      - company-service
      - notification-service
      - messaging-service
    environment:
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - app-network

  auth-service:
    build: ./services/auth-service
    ports:
      - "4001:4001"
    environment:
      - MONGO_URI=${AUTH_MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - app-network

  order-service:
    build: ./services/order-service
    ports:
      - "4002:4002"
    environment:
      - MONGO_URI=${ORDER_MONGO_URI}
      - ADMIN_MONGO_URI=${ADMIN_MONGO_URI}
      - KAFKA_BROKERS=kafka:9092
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
    depends_on:
      - mongodb
      - kafka
      - redis
    networks:
      - app-network

  ticket-service:
    build: ./services/ticket-service
    ports:
      - "4003:4003"
    environment:
      # MongoDB Atlas: Same cluster, different database
      # Define TICKET_MONGO_URI in your .env file
      - MONGO_URI=${TICKET_MONGO_URI}
      - KAFKA_BROKERS=kafka:9092
      - REDIS_URL=redis://redis:6379
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
    depends_on:
      - mongodb
      - kafka
      - redis
    networks:
      - app-network

  company-service:
    build: ./services/company-service
    ports:
      - "4004:4004"
    environment:
      # MongoDB Atlas: Same cluster, different database
      # Define COMPANY_MONGO_URI in your .env file
      - MONGO_URI=${COMPANY_MONGO_URI}
      - KAFKA_BROKERS=kafka:9092
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - COMPANY_PORTAL_URL=${COMPANY_PORTAL_URL}
    depends_on:
      - mongodb
      - kafka
      - redis
    networks:
      - app-network

  notification-service:
    build: ./services/notification-service
    ports:
      - "4005:4005"
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - NOTIFICATION_FROM=${NOTIFICATION_FROM}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - COMPANY_PORTAL_URL=${COMPANY_PORTAL_URL}
      - CF_BRAND_LOGO_URL=${CF_BRAND_LOGO_URL}
    depends_on:
      - kafka
    networks:
      - app-network

  messaging-service:
    build: ./services/messaging-service
    ports:
      - "4006:4006"
    environment:
      - MONGO_URI=${MESSAGING_MONGO_URI}
      - ADMIN_MONGO_URI=${ADMIN_MONGO_URI}
      - KAFKA_BROKERS=kafka:9092
      - JWT_SECRET=${JWT_SECRET}
      - COMPANY_SERVICE_URL=http://company-service:4004
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    depends_on:
      - mongodb
      - kafka
      - company-service
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge